{% extends "base.html" %}

{% block title %}
    <title>{{ fluent(key="role", lang=lang )}}</title>
{% endblock title %}

{% block content %}
<div class="col-12 px-md-4 px-2 py-4">
    <div class="card shadow-lg mb-4 mx-auto" style="max-width: 800px;">
        <div class="card-header bg-warning text-dark">
            <h1 class="h4 mb-0"><i class="bi bi-arrow-left-right" aria-hidden="true"></i> Confirm Transfer</h1>
        </div>
        <div class="card-body">
            {% include "role/_transfer_confirm_inner.html" %}
        </div>
        <div class="card-footer d-flex gap-2 justify-content-end">
            <a href="{{ cancel_url }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" form="transferForm" class="btn btn-success">
                <i class="bi bi-check-lg" aria-hidden="true"></i> Confirm Transfer
            </button>
        </div>
    </div>
</div>
{% endblock content %}
