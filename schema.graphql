	email: String!
	phone: String!
	workAddress: String!
	city: String!
	province: String!
	postalCode: String!
	country: String!
	organizationId: UUID!
	peoplesoftId: String!
	orcidId: String!
	"""
	Distinguishes military members from civilian employees,
	contractors, students and others
	"""
	personnelType: PersonnelType!
	createdAt: NaiveDateTime!
	updatedAt: NaiveDateTime!
	retiredAt: NaiveDateTime
	internalPeoplesoftId: String!
	"""
	Returns the person's family or second name
	"""
	familyName: String!
	"""
	Returns the persons given or first name
	"""
	givenName: String!
	"""
	Returns the person's organization
	"""
	organization: Organization!
	"""
	Positions this person used to occupy, derived from their closed tenures.
	This is the person's career progression and survives the position being
	reassigned to someone else.
	"""
	inactiveRoles: [Role!]!
	"""
	The position this person currently occupies, derived from their open
	tenure. A person holds at most one active role at a time.
	"""
	activeRoles: [Role!]!
	"""
	Full career history: every tenure this person has held, most recent
	first, each with its start/end dates and the role it belonged to.
	"""
	roleAssignments: [RoleAssignment!]!
	"""
	Returns the sum effort of active work across this person's active
	roles. Maximum sustainable effort is around 10, so lower values
	indicate capacity to take on new work.
	"""
	activeEffort: Int!
	"""
	Returns person's affiliations with other organizations
	"""
	affiliations: [Affiliation!]!
	"""
	Teams owned by this person, derived from the roles they currently
	occupy. Ownership lives on the Role (the manager position), so this
	aggregates across the person's active roles.
	"""
	ownedTeams: [Team!]!
	"""
	Organizational tiers owned by this person, derived from the roles they
	currently occupy (ownership lives on the manager Role).
	"""
	ownedOrgTiers: [OrgTier!]!
	"""
	Returns the persons capabilities
	"""
	capabilities: [Capability!]!
	"""
	Returns a vector of the validations made by the person. Only available to analyst level access and above.
	"""
	validations: [Validation!]!
	publications: [Publication!]!
	"""
	Returns a vector of the language results for the person
	"""
	languageData: [LanguageData!]!
	findMatches: [Role!]!
}

