type Mutation {
	createUser(userData: UserData!): User!
	updateUser(userData: UserUpdate!): User!
	"""
	Grant a provisioned account a path to access: issue an activation token
	and move the user to INVITED. Returns the token + expiry so the operator
	can share an activation link (no email is sent in v1).
	"""
	inviteUser(userId: UUID!): InviteResult!
	"""
	Redeem an activation token by setting a password. Public: this is how an
	invited person gains access. Moves the account to ACTIVE.
	"""
	activateAccount(token: String!, password: String!): Boolean!
	"""
	Revoke a user's access (record retained). Admin only.
	"""
	disableUser(userId: UUID!): User!
	"""
	Re-enable a disabled user. Restores ACTIVE if they have a password,
	otherwise PROVISIONED (they still need to activate). Admin only.
	"""
	enableUser(userId: UUID!): User!
	"""
	Grant access to a person's account by person id, for operators who manage
	people but cannot read user records directly (userByEmail is admin-only).
	Resolves the person's account and issues an activation invite. Refuses if
	the account is already ACTIVE, so it is safe to call without first
	inspecting account status.
	"""
	invitePerson(personId: UUID!): InviteResult!
	signIn(input: LoginQuery!): UserResponse!
	createPerson(data: NewPersonInput!): Person!
	updatePerson(data: PersonData!): Person!
	"""
	Un-retire a person by clearing retired_at.
	"""
	restorePerson(id: UUID!): Person!
	createRole(roleData: NewRole!): Role!
	updateRole(roleData: RoleData!): Role!
	"""
	Assign a person to a vacant role. Errors if the role is already occupied.
	"""
	assignPersonToRole(personId: UUID!, roleId: UUID!): Role!
	"""
	Remove the person from a role, leaving it vacant.
	"""
	vacateRole(roleId: UUID!): Role!
	"""
	Set (or clear) the position a role reports to. Pass `reportsToRoleId`
	= null to clear the explicit edge and fall back to the team owner.
	Rejects self-references and cycles. The caller must manage the role's
	team.
	"""
	setRoleReportsTo(roleId: UUID!, reportsToRoleId: UUID): Role!
	createCapability(data: NewCapability!): Capability!
	"""
	An operator may update a capability.
	To update a validated_level, you must include the Uuid of the validator and their
	current validated level. If the validator's level is equal or greater than the
	level they are validating, the system will update validated_level.
	Need to update Capability to also track the validator_uuid
	"""
	updateCapability(data: CapabilityData!): Capability!
	createSkill(data: NewSkill!): Skill!
	"""
	An operator may update a skill.
	To update a validated_level, you must include the Uuid of the validator and their
	current validated level. If the validator's level is equal or greater than the
	level they are validating, the system will update validated_level.
	Need to update Skill to also track the validator_uuid
	"""
	updateSkill(data: SkillData!): Skill!
	createOrganization(data: NewOrganization!): Organization!
	updateOrganization(data: OrganizationData!): Organization!
	"""
	Un-retire an organization by clearing retired_at. The update
	resolvers treat a null field as "unchanged", so clearing needs a
	dedicated mutation.
	"""
	restoreOrganization(id: UUID!): Organization!
	createOrgTier(data: NewOrgTier!): OrgTier!
	updateOrgTier(data: OrgTierData!): OrgTier!
	"""
	Un-retire an org tier by clearing retired_at.
	"""
	restoreOrgTier(id: UUID!): OrgTier!
	createOrgOwnership(data: NewOrgOwnership!): OrgOwnership!
	updateOrgOwnership(data: OrgOwnershipData!): OrgOwnership!
	createTeam(data: NewTeam!): Team!
	updateTeam(data: TeamData!): Team!
	"""
	Un-retire a team by clearing retired_at.
	"""
	restoreTeam(id: UUID!): Team!
	createTeamOwnership(data: NewTeamOwnership!): TeamOwnership!
	updateTeamOwnership(data: TeamOwnershipData!): TeamOwnership!
	createAffiliation(data: NewAffiliation!): Affiliation!
	updateAffiliation(data: AffiliationData!): Affiliation!
	createPublication(data: NewPublication!): Publication!
	updatePublication(data: PublicationData!): Publication!
	createPublicationContributor(data: NewPublicationContributor!): PublicationContributor!
	updatePublicationContributor(data: PublicationContributorData!): PublicationContributor!
	createWork(data: NewWork!): Work!
	updateWork(data: WorkData!): Work!
	createTask(data: NewTask!): Task!
	updateTask(data: TaskData!): Task!
	createProduct(data: NewProduct!): Product!
	updateProduct(data: ProductData!): Product!
	createRequirement(data: NewRequirement!): Requirement!
	updateRequirement(data: RequirementData!): Requirement!
	"""
	Records a central authority's validation of a person's capability. The
	capability's validated_level is set directly from this validation, and
	the validating authority and date are stamped onto the capability for
	provenance. The validation is retained as date-stamped history.
	"""
	createValidation(data: NewValidation!): Validation!
	"""
	Updates a validation's level. The associated capability's
	validated_level is set directly from this authoritative validation,
	and its validation provenance (authority and date) is refreshed.
	"""
	updateValidation(data: ValidationData!): Validation!
	createLanguageData(data: NewLanguageData!): LanguageData!
	updateLanguageData(data: LanguageDataUpdate!): LanguageData!
	"""
	Update the caller's own Person record (contact details). Authorized by
	ownership: the record must be linked to the caller's user account, so no
	role guard is needed — a plain authenticated user may edit only themself.
	"""
	updateMyPerson(data: MyPersonUpdate!): Person!
	"""
	Raise a correction flag against the caller's own record for operators to
	review.
	"""
	flagRecordIssue(message: String!): RecordFlag!
	"""
	Mark a record flag resolved. Operator/admin only.
	"""
	resolveRecordFlag(id: UUID!): RecordFlag!
}

