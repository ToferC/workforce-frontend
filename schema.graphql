schema {
  query: Query
  mutation: Mutation
}
"""
ISO 8601 combined date and time without timezone.

# Examples

* `2015-07-01T08:59:60.123`,
"""
scalar NaiveDateTime
"""
A UUID is a unique 128-bit number, stored as 16 octets. UUIDs are parsed as
Strings within GraphQL. UUIDs are used to assign unique identifiers to
entities without requiring a central allocating authority.

# References

* [Wikipedia: Universally Unique Identifier](http://en.wikipedia.org/wiki/Universally_unique_identifier)
* [RFC4122: A Universally Unique Identifier (UUID) URN Namespace](http://tools.ietf.org/html/rfc4122)
"""
scalar UUID
type Affiliation {
  id: UUID!
  personId: UUID!
  organizationId: UUID!
  homeOrgId: UUID!
  affiliationRole: String!
  startDatestamp: NaiveDateTime!
  endDate: NaiveDateTime
  createdAt: NaiveDateTime!
  updatedAt: NaiveDateTime!
  person: Person!
  organization: Organization!
  homeOrganization: Organization!
}
"A representation of a persons ability to use a skill at a specific level"
type Capability {
  id: UUID!
  nameEn: String!
  nameFr: String!
  domain: SkillDomain!
  skillId: UUID!
  organizationId: UUID!
  selfIdentifiedLevel: CapabilityLevel!
  validatedLevel: CapabilityLevel
  createdAt: NaiveDateTime!
  updatedAt: NaiveDateTime!
  retiredAt: NaiveDateTime
  person: Person!
  skillName: String!
  skill: Skill!
  "Detailed view of validations for this capability"
  validations: [Validation!]!
}
type CapabilityCount {
  name: String!
  domain: SkillDomain!
  level: String!
  counts: Int!
}
"A representation of a persons' language proficiency"
type LanguageData {
  id: UUID!
  personId: UUID!
  languageName: LanguageName!
  reading: LanguageLevel
  writing: LanguageLevel
  speaking: LanguageLevel
  createdAt: NaiveDateTime!
  updatedAt: NaiveDateTime!
}
type Mutation {
  createUser(userData: UserData!): User!
  updateUser(userData: UserUpdate!): User!
  signIn(input: LoginQuery!): UserResponse!
  createPerson(data: NewPerson!): Person!
  updatePerson(data: PersonData!): Person!
  createRole(roleData: NewRole!): Role!
  updateRole(roleData: RoleData!): Role!
  createCapability(data: NewCapability!): Capability!
  """
  An operator may update a capability.
  To update a validated_level, you must include the Uuid of the validator and their
  current validated level. If the validator's level is equal or greater than the
  level they are validating, the system will update validated_level.
  Need to update Capability to also track the validator_uuid
  """
  updateCapability(data: CapabilityData!): Capability!
  createSkill(data: NewSkill!): Skill!
  """
  An operator may update a skill.
  To update a validated_level, you must include the Uuid of the validator and their
  current validated level. If the validator's level is equal or greater than the
  level they are validating, the system will update validated_level.
  Need to update Skill to also track the validator_uuid
  """
  updateSkill(data: SkillData!): Skill!
  createOrganization(data: NewOrganization!): Organization!
  updateOrganization(data: OrganizationData!): Organization!
  createOrgTier(data: NewOrgTier!): OrgTier!
  updateOrgTier(data: OrgTierData!): OrgTier!
  createOrgOwnership(data: NewOrgOwnership!): OrgOwnership!
  updateOrgOwnership(data: OrgOwnershipData!): OrgOwnership!
  createTeam(data: NewTeam!): Team!
  updateTeam(data: TeamData!): Team!
  createTeamOwnership(data: NewTeamOwnership!): TeamOwnership!
  updateTeamOwnership(data: TeamOwnershipData!): TeamOwnership!
  createAffiliation(data: NewAffiliation!): Affiliation!
  updateAffiliation(data: AffiliationData!): Affiliation!
  createPublication(data: NewPublication!): Publication!
  updatePublication(data: PublicationData!): Publication!
  createPublicationContributor(data: NewPublicationContributor!): PublicationContributor!
  updatePublicationContributor(data: PublicationContributorData!): PublicationContributor!
  createWork(data: NewWork!): Work!
  updateWork(data: WorkData!): Work!
  createTask(data: NewTask!): Task!
  updateTask(data: TaskData!): Task!
  createRequirement(data: NewRequirement!): Requirement!
  updateRequirement(data: RequirementData!): Requirement!
  """
  Creates a validation for a person's capability. Also automatically updates
  the associated capability's validated_level based on the average of all validations.
  """
  createValidation(data: NewValidation!): Validation!
  """
  Updates a validation's level. Also automatically recalculates
  the associated capability's validated_level.
  """
  updateValidation(data: ValidationData!): Validation!
  createLanguageData(data: NewLanguageData!): LanguageData!
  updateLanguageData(data: LanguageDataUpdate!): LanguageData!
}
"""
Represents a relationship between a person (owner) and an organizational tier
Will be used to inform approvals and organizational authority
"""
type OrgOwnership {
  id: UUID!
  ownerId: UUID!
  orgTierId: UUID!
  createdAt: NaiveDateTime!
  updatedAt: NaiveDateTime!
  retiredAt: NaiveDateTime
}
"""
Represents an organizational level starting at the top (CEO or President's office) as 0
and then increasing in tier number as you go deeper into the organization.
Used to model an organizational hierarchy independent of people
"""
type OrgTier {
  id: UUID!
  tierLevel: Int!
  nameEn: String!
  nameFr: String!
  primaryDomain: SkillDomain!
  createdAt: NaiveDateTime!
  updatedAt: NaiveDateTime!
  retiredAt: NaiveDateTime
  organization: Organization!
  parentOrganizationTier: OrgTier
  childOrganizationTier: [OrgTier!]!
  owner: Person!
  teams: [Team!]!
}
"""
Represents an organization as a core structure within which are
Person(s), OrgTiers, Publications
"""
type Organization {
  id: UUID!
  nameEn: String!
  nameFr: String!
  acronymEn: String!
  acronymFr: String!
  orgType: String!
  url: String!
  createdAt: NaiveDateTime!
  updatedAt: NaiveDateTime!
  retiredAt: NaiveDateTime
  affiliations: [Affiliation!]!
  publications: [Publication!]!
  orgTiers: [OrgTier!]!
  topOrgTier: [OrgTier!]!
  capabilityCounts: [CapabilityCount!]!
}
"""
Represents a person working in an organization
Referenced by Team
Referenced by ReportingRelationship
Will break out address and contact info soon
"""
type Person {
  id: UUID!
  userId: UUID!
  email: String!
  phone: String!
  workAddress: String!
  city: String!
  province: String!
  postalCode: String!
  country: String!
  organizationId: UUID!
  peoplesoftId: String!
  orcidId: String!
  createdAt: NaiveDateTime!
  updatedAt: NaiveDateTime!
  retiredAt: NaiveDateTime
  internalPeoplesoftId: String!
  "Returns the person's family or second name"
  familyName: String!
  "Returns the persons given or first name"
  givenName: String!
  "Returns the person's organization"
  organization: Organization!
  "Returns active or inactive roles depending on the active boolean of true or false"
  inactiveRoles: [Role!]!
  "Returns active role"
  activeRoles: [Role!]!
  "Returns person's affiliations with other organizations"
  affiliations: [Affiliation!]!
  "Returns a vector of the teams owned by this person"
  ownedTeams: [Team!]!
  "Returns a vector of the organizational tiers owned by this person"
  ownedOrgTiers: [OrgTier!]!
  "Returns the persons capabilities"
  capabilities: [Capability!]!
  "Returns a vector of the validations made by the person. Only available to analyst level access and above."
  validations: [Validation!]!
  publications: [Publication!]!
  "Returns a vector of the language results for the person"
  languageData: [LanguageData!]!
  findMatches: [Role!]!
}
type Publication {
  id: UUID!
  title: String!
  subjectText: String!
  publicationStatus: PublicationStatus!
  urlString: String
  publishingId: String
  submittedDate: NaiveDateTime
  publishedDatestamp: NaiveDateTime
  createdAt: NaiveDateTime!
  updatedAt: NaiveDateTime!
  leadAuthor: Person!
  publishingOrganization: Organization!
  contributors: [Person!]!
}
type PublicationContributor {
  publication: Publication!
  contributor: Person!
  contributorRole: String!
}
type Query {
  "Returns count number of Capabilities in the system"
  capabilities(count: Int!): [Capability!]!
  "Returns a capability by its Uuid"
  capabilityById(id: UUID!): Capability!
  """
  Accepts a String "name" and returns a vector of capabilities that
  match in EN or FR against it
  """
  capabilitiesByName(name: String!): [Capability!]!
  """
  Accepts a String "name" and a CapabilityLevel and returns matches against both
  """
  capabilitiesByNameAndLevel(name: String!, level: CapabilityLevel!): [Capability!]!
  "Return a count of the number of people who have a capability at each level of the capability"
  capabilityCountsByName(name: String!): [CapabilityCount!]!
  "Return a CapabilityCount by a specific SkillDomain (SCIENTIFIC, etc.)"
  capabilityCountsByDomain(domain: SkillDomain!): [CapabilityCount!]!
  "Returns vector of all skills"
  skills: [Skill!]!
  "Returns a specific skill by ID"
  skillById(id: UUID!): Skill!
  "Returns a vector of skills matching some part of the name provided"
  skillByName(name: String!): [Skill!]!
  """
  Accepts argument of "count" and returns a vector of {count} persons ordered by
  family name.D
  """
  allPeople: [Person!]!
  """
  Accepts argument of "count" and returns a vector of {count} persons ordered by
  family name
  """
  People(count: Int!): [Person!]!
  """
  Accepts argument of "count" and returns a vector of {count} persons ordered by
  family name
  """
  peopleCount: Int!
  personById(id: UUID!): Person!
  personByName(name: String!): [Person!]!
  "Returns a vector of all travel groups"
  allTeams: [Team!]!
  teamOwnershipByTeamId(teamId: UUID!): TeamOwnership!
  "Returns a specific travel group by its UUID"
  teamByID(id: UUID!): Team!
  teamByName(name: String!): [Team!]!
  "Returns a vector of all organizations"
  allOrganizations: [Organization!]!
  """
  Accepts argument "count" and returns a vector of {count} organizations
  """
  organizations(count: Int!): [Organization!]!
  organizationByName(name: String!): [Organization!]!
  organizationById(id: UUID!): Organization!
  "Returns a vector of all  org tiers"
  allOrgTiers: [OrgTier!]!
  "Returns a vector of org tiers for a specific org ID"
  orgTiersByOrgId(id: UUID!): [OrgTier!]!
  orgOwnershipByTierId(orgTierId: UUID!): OrgOwnership!
  """
  Accepts argument "count" and returns a vector of {count} org tiers
  """
  OrgTiers(count: Int!): [OrgTier!]!
  orgTierById(id: UUID!): OrgTier!
  orgTierByName(name: String!): [OrgTier!]!
  orgChart(id: UUID!): [String!]!
  "Returns a vector of all users"
  allUsers: [User!]!
  "Returns a vector of all users"
  userByEmail(email: String!): User!
  "Returns a vector of all users"
  userById(id: UUID!): User!
  """
  Accepts an argument of "count" and returns a vector of {count} active role
  """
  activeRoles(count: Int!): [Role!]!
  """
  Accepts an argument of "count" and returns a vector of {count} active role
  """
  vacantRoles(count: Int!): [Role!]!
  "Returns a vector of all persons ordered by family name"
  allRoles: [Role!]!
  roleById(id: UUID!): Role!
  "returns a count of the total roles in the system"
  roleCount: Int!
  "Returns a vector of all publications"
  allPublications: [Publication!]!
  """
  Accepts argument "count" and returns a vector of {count} publications
  """
  publicationCount(count: Int!): [Publication!]!
  """
  Accepts argument "title" and returns a vector of publications with that title or subject
  """
  publicationByTitle(title: String!): [Publication!]!
  "Accepts id and returns a publications"
  publicationById(id: UUID!): Publication!
  """
  Accepts argument of "count" and returns a vector of {count} tasks ordered by
  family name.D
  """
  allTasks: [Task!]!
  """
  Accepts argument of "count" and returns a vector of {count} tasks ordered by
  family name
  """
  Tasks(count: Int!): [Task!]!
  taskById(id: UUID!): Task!
  taskByName(name: String!): [Task!]!
  """
  Accepts an argument of "count" and returns a vector of {count} work
  """
  work(count: Int!): [Work!]!
  "Returns a vector of all persons ordered by family name"
  allWork: [Work!]!
  workById(id: UUID!): Work!
}
"A representation of a roles ability to use a skill at a specific level"
type Requirement {
