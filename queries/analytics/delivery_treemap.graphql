# Delivery treemap: the full Product → Task → Work hierarchy with effort
# at each level, used to render a server-aggregated ECharts treemap.
query DeliveryTreemap {
  allProducts {
    id
    nameEn
    nameFr
    effort
    primaryDomain
    productStatus
    priority
    tasks {
      id
      title
      effort
      domain
      taskStatus
      priority
      work {
        id
        workDescription
        effort
        workStatus
        priority
        domain
      }
    }
  }
}
