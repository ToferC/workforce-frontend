# Talent mobility: each person's tenures (role assignments) with the team each
# role belongs to, used to build a previous-team → current-team sankey of
# movement across the organization. The open assignment is the current team;
# the most recently closed assignment is the previous team.
query AnalyticsMobility {
  allPeople {
    id
    givenName
    familyName
    retiredAt
    roleAssignments {
      id
      startDate
      endDate
      isCurrent
      role {
        id
        team {
          id
          nameEnglish
        }
      }
    }
  }
}
