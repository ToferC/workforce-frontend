query OrganizationById($id:UUID!) {
  organizationById(id:$id) {
    id
    nameEn
    nameFr
    acronymEn
    acronymFr
    orgType
    url
    retiredAt
    topOrgTier {
      id
      nameEn
      primaryDomain
      owner {
        id
        person {
          id
          givenName
          familyName
          email
        }
      }
    }
    capabilityCounts {
      domain
      name
      level
      counts
    }
    publications {
      id
      title
      publicationStatus
      leadAuthor {
        id
        givenName
        familyName
      }
    }
    affiliations {
      id
      affiliationRole
      organization {
        id
        nameEn
      }
      person {
        id
        givenName
        familyName
      }
    }
  }
}