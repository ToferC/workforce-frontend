query TaskById($id:UUID!) {
  taskById(id:$id) {
    id
    title
    domain
    intendedOutcome
    finalOutcome
    approvalTier
    url
    startDatestamp
    targetCompletionDate
    taskStatus
    priority
    priorityBelowParent
    workPriorityMismatchCount
    completedDate
    effort
    approvalStatus
    approvedAt
    rejectionReason
    approvedByName
    product {
      id
      nameEn
      nameFr
    }
    work {
      id
      workDescription
      url
      domain
      capabilityLevel
      effort
      priority
      priorityBelowParent
      workStatus
      dueDate
      blockedSince
      role {
        id
        titleEnglish
        militaryOccupation
        rank
        person {
          id
          familyName
          givenName
          email
          phone
          organization {
            id
            nameEn
          }
      	}
    	}
    }
    createdBy {
      id
      titleEnglish
      person {
        id
        givenName
        familyName
        email
        phone
        activeRoles {
          id
          titleEnglish
        }
      }
      team {
        id
        nameEnglish
      }
    }
    
  }
}