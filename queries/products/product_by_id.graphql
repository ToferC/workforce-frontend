query ProductById($id: UUID!) {
  productById(id: $id) {
    id
    nameEn
    nameFr
    descriptionEn
    descriptionFr
    primaryDomain
    url
    productStatus
    priority
    priorityMismatchCount
    retiredAt
    effort
    skillDemand {
      name
      skillName
      domain
      level
      workCount
      totalEffort
    }
    organization {
      id
      nameEn
    }
    productOwner {
      id
      titleEnglish
      person {
        id
        givenName
        familyName
      }
      team {
        id
        nameEnglish
      }
    }
    tasks {
      id
      title
      taskStatus
      domain
      effort
      priority
      priorityBelowParent
      workPriorityMismatchCount
    }
    vacantWork {
      id
      workDescription
      domain
      capabilityLevel
      effort
    }
  }
}
