query OrgTierById($id:UUID!) {
  orgTierById(id:$id) {
    id
    nameEn
    nameFr
    primaryDomain
    retiredAt
    tierLevel
    parentOrganizationTier {
      id
      nameEn
    }
    organization {
      id
      nameEn
    }
    owner {
      id
      givenName
      familyName
      email
    }
    childOrganizationTier {
      nameEn
      id
    }
    headcount
    totalEffort
    capabilityCounts {
      name
      domain
      level
      counts
    }
    capabilityHeatmap {
      teamId
      teamName
      cells {
        domain
        depth
        peopleCount
      }
    }
    teams {
      nameEnglish
      id
      owner {
        familyName
        givenName
        id
      }
    }
  }
}