query OrgTierById($id:UUID!) {
  orgTierById(id:$id) {
    id
    nameEn
    nameFr
    primaryDomain
    retiredAt
    tierLevel
    parentOrganizationTier {
      id
      nameEn
    }
    organization {
      id
      nameEn
    }
    owner {
      id
      person {
        id
        givenName
        familyName
        email
      }
    }
    childOrganizationTier {
      nameEn
      id
    }
    headcount
    totalEffort
    capabilityCounts {
      name
      domain
      level
      counts
    }
    teams {
      nameEnglish
      id
      owner {
        id
        person {
          id
          givenName
          familyName
        }
      }
    }
  }
}