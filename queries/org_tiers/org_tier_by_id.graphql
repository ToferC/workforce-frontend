query OrgTierById($id:UUID!) {
  orgTierById(id:$id) {
    id
    nameEn
    nameFr
    primaryDomain
    retiredAt
    tierLevel
    parentOrganizationTier {
      id
      nameEn
    }
    organization {
      id
      nameEn
    }
    owner {
      id
      givenName
      familyName
      email
    }
    childOrganizationTier {
      nameEn
      id
    }
    teams {
      nameEnglish
      id
      owner {
        familyName
        givenName
        id
      }
    }
  }
}