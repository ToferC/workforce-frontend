query OrgTiersByOrgId($id:UUID!) {
  orgTiersByOrgId(id:$id) {
    id
    nameEn
    nameFr
    primaryDomain
    tierLevel
    retiredAt
    parentOrganizationTier {
      id
      nameEn
    }
    organization {
      id
      nameEn
    }
    owner {
      id
      givenName
      familyName
    }
    teams {
      nameEnglish
      id
    }
  }
}