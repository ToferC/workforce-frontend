query WorkById($id:UUID!) {
  workById(id:$id) {
    id
    workDescription
    url
    domain
    capabilityLevel
    effort
    workStatus
    priority
    dueDate
    startedAt
    completedAt
    blockedReason
    blockedSince
    blockedOnRole {
      id
      titleEnglish
      militaryOccupation
      rank
      team {
        id
        nameEnglish
      }
      person {
        id
        givenName
        familyName
        email
        phone
      }
    }
    task {
      id
      title
      domain
      targetCompletionDate
      product {
        id
        nameEn
        nameFr
      }
      createdBy {
        id
        titleEnglish
        militaryOccupation
        rank
        person {
          id
          givenName
          familyName
        }
        team {
          id
          nameEnglish
        }
      }
    }
    skill {
      id
      nameEn
    }
    role {
      id
      titleEnglish
      militaryOccupation
      rank
      person {
        id
        familyName
        givenName
        workAddress
        email
        phone
        organization {
            id
            nameEn
        }
      }
    }
    capabilityMatches(count: 10) {
      id
      nameEn
      validatedLevel
      selfIdentifiedLevel
      person {
        id
        givenName
        familyName
        activeEffort
        activeRoles {
          id
          titleEnglish
          militaryOccupation
          rank
        }
      }
    }
    statusHistory {
      fromStatus
      toStatus
      changedAt
      changedByName
    }
    updates {
      id
      kind
      body
      createdAt
      flagResolvedAt
      authorName
      resolvedByName
    }
  }
}