query WorkById($id:UUID!) {
  workById(id:$id) {
    id
    workDescription
    url
    domain
    capabilityLevel
    effort
    workStatus
    priority
    task {
      id
      title
      domain
      targetCompletionDate
      createdBy {
        id
        titleEnglish
        militaryOccupation
        rank
        person {
          id
          givenName
          familyName
        }
        team {
          id
          nameEnglish
        }
      }
    }
    skill {
      id
      nameEn
    }
    role {
      id
      titleEnglish
      militaryOccupation
      rank
      person {
        id
        familyName
        givenName
        workAddress
        email
        phone
        organization {
            id
            nameEn
        }
      }
    }
    capabilityMatches(count: 10) {
      id
      nameEn
      validatedLevel
      selfIdentifiedLevel
      person {
        id
        givenName
        familyName
        activeEffort
        activeRoles {
          id
          titleEnglish
          militaryOccupation
          rank
        }
      }
    }
  }
}