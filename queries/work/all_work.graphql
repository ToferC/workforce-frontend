query AllWork($status: WorkStatus, $unassignedOnly: Boolean!, $limit: Int, $offset: Int!) {
  allWork(status: $status, unassignedOnly: $unassignedOnly, limit: $limit, offset: $offset) {
    id
    workDescription
    domain
    capabilityLevel
    effort
    workStatus
    priority
    dueDate
    blockedSince
    task {
      id
      title
    }
    role {
      id
      titleEnglish
      person {
        id
        givenName
        familyName
      }
    }
  }
  workCount(status: $status, unassignedOnly: $unassignedOnly)
}
