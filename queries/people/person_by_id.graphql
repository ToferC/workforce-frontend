query PersonById($id:UUID!) {
  personById(id:$id) {
    id
    familyName
   	givenName
    phone
    email
    workAddress
    city
    province
    postalCode
    country
    peoplesoftId
    orcidId
    personnelType
    activeEffort
    retiredAt
    organization {
      id
      nameEn
    }
    languageData {
      id
      languageName
      reading
      writing
      speaking
    }
    capabilities {
      id
      nameEn
      domain
      selfIdentifiedLevel
      validatedLevel
      validatedAt
      validatedBy {
        id
        name
      }
    }
    activeRoles {
      id
      titleEnglish
      startDate
      endDate
      militaryOccupation
      rank
      occupationalGroup
      occupationalLevel
      effort
      team {
        id
        nameEnglish
        organizationLevel {
          nameEn
          primaryDomain
        }
        owner {
          id
          person {
            id
            givenName
            familyName
            email
          }
        }
      }
      work {
        id
        workDescription
        domain
        capabilityLevel
        workStatus
        effort
        dueDate
      }
    }
    inactiveRoles {
      id
      titleEnglish
      startDate
      endDate
      militaryOccupation
      rank
      occupationalGroup
      occupationalLevel
    }
    roleAssignments {
      id
      startDate
      endDate
      isCurrent
      role {
        id
        titleEnglish
        militaryOccupation
        rank
        occupationalGroup
        occupationalLevel
        team {
          id
          nameEnglish
        }
      }
    }
    findMatches {
      id
      titleEnglish
      militaryOccupation
      rank
      occupationalGroup
      occupationalLevel
      requirements {
        nameEn
        domain
        requiredLevel
      }
    }
    affiliations {
      id
      organization {
        nameEn
        id
      }
      affiliationRole
    }
    publications {
      id
      title
      urlString
      subjectText
      publicationStatus
      publishedDatestamp
    }
  }
}