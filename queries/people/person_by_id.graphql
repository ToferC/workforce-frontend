query PersonById($id:UUID!) {
  personById(id:$id) {
    id
    familyName
   	givenName
    phone
    email
    workAddress
    city
    province
    postalCode
    country
    peoplesoftId
    orcidId
    personnelType
    activeEffort
    retiredAt
    organization {
      id
      nameEn
    }
    languageData {
      id
      languageName
      reading
      writing
      speaking
    }
    capabilities {
      id
      nameEn
      domain
      selfIdentifiedLevel
      validatedLevel
      validatedAt
      validatedBy {
        id
        givenName
        familyName
      }
    }
    activeRoles {
      id
      titleEnglish
      startDate
      endDate
      militaryOccupation
      rank
      effort
      team {
        id
        nameEnglish
        organizationLevel {
          nameEn
          primaryDomain
        }
        owner {
          id
          givenName
          familyName
          email
        }
      }
      work {
        id
        workDescription
        domain
        capabilityLevel
        workStatus
        effort
      }
    }
    inactiveRoles {
      id
      titleEnglish
      startDate
      endDate
      militaryOccupation
      rank
    }
    findMatches {
      id
      titleEnglish
      militaryOccupation
      rank
      requirements {
        nameEn
        domain
        requiredLevel
      }
    }
    affiliations {
      id
      organization {
        nameEn
        id
      }
      affiliationRole
    }
    publications {
      id
      title
      urlString
      subjectText
      publicationStatus
      publishedDatestamp
    }
  }
}