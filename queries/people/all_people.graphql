query AllPeople($search: String, $organizationId: UUID, $roleStatus: String, $includeRetired: Boolean!, $limit: Int, $offset: Int!) {
  allPeople(search: $search, organizationId: $organizationId, roleStatus: $roleStatus, includeRetired: $includeRetired, limit: $limit, offset: $offset) {
    id
    givenName
    familyName
    retiredAt
    organization { id nameEn }
    activeRoles { id }
  }
  peopleCount(search: $search, organizationId: $organizationId, roleStatus: $roleStatus, includeRetired: $includeRetired)
}
