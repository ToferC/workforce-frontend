query RoleById($id:UUID!) {
  	roleById(id:$id) {
    id
    titleEnglish
    titleFrench
    active
    militaryOccupation
    rank
    startDate
    endDate
    person {
      id
      familyName
      givenName
      phone
      email
      capabilities {
        nameEn
        domain
        validatedLevel
        selfIdentifiedLevel
      }
    }
    team {
      id
      nameEnglish
      organizationLevel {
        nameEn
        primaryDomain
      }
      owner {
        id
        givenName
        familyName
        email
      }
    }
    effort
    work {
      id
      workDescription
      domain
      capabilityLevel
      workStatus
      effort
    }
    requirements {
      id
      nameEn
      domain
      requiredLevel
    }
    assignments {
      id
      startDate
      endDate
      isCurrent
      person {
        id
        givenName
        familyName
      }
    }
  }
}