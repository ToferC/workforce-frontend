query RoleById($id:UUID!) {
  	roleById(id:$id) {
    id
    titleEnglish
    titleFrench
    active
    militaryOccupation
    rank
    occupationalGroup
    occupationalLevel
    startDate
    endDate
    person {
      id
      familyName
      givenName
      phone
      email
      capabilities {
        nameEn
        domain
        validatedLevel
        selfIdentifiedLevel
      }
    }
    team {
      id
      nameEnglish
      organizationLevel {
        nameEn
        primaryDomain
      }
      owner {
        id
        person {
          id
          givenName
          familyName
          email
        }
      }
    }
    effort
    work {
      id
      workDescription
      domain
      capabilityLevel
      workStatus
      effort
      dueDate
    }
    requirements {
      id
      nameEn
      domain
      requiredLevel
    }
    assignments {
      id
      startDate
      endDate
      isCurrent
      person {
        id
        givenName
        familyName
      }
    }
    manager {
      id
      titleEnglish
      titleFrench
      person {
        id
        givenName
        familyName
      }
    }
    directReports {
      id
      titleEnglish
      titleFrench
      person {
        id
        givenName
        familyName
      }
    }
      annualSalary
    finances { fiscalYear budgetedCents projectedCents lapseCents }
  }
}