query TeamById($id:UUID!) {
  teamByID(id: $id) {
    id
    nameEnglish
    nameFrench
    descriptionEnglish
    descriptionFrench
    retiredAt
    organizationLevel {
      nameEn
      id
    }
    organization {
      id
      nameEn
    }
    headcount
    totalEffort
    capabilityCounts {
      name
      domain
      level
      counts
    }
    occupiedRoles {
      titleEnglish
      id
      rank
      militaryOccupation
      effort
      person {
        givenName
        familyName
        id
        capabilities {
          nameEn
          nameFr
          domain
          validatedLevel
          selfIdentifiedLevel
        }
      }
      work {
        id
        workDescription
        workStatus
        effort
        task {
          id
          title
          taskStatus
          product {
            id
            nameEn
            nameFr
          }
        }
      }
    }
    vacantRoles {
      titleEnglish
      id
      rank
      militaryOccupation
    }
    owner {
      id
      person {
        id
        givenName
        familyName
        email
      }
    }
  }
}