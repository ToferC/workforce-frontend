query TeamById($id:UUID!) {
  teamByID(id: $id) {
    id
    nameEnglish
    nameFrench
    descriptionEnglish
    descriptionFrench
    retiredAt
    organizationLevel {
      nameEn
      id
    }
    organization {
      id
      nameEn
    }
    headcount
    totalEffort
    capabilityCounts {
      name
      domain
      level
      counts
    }
    capabilityHeatmap {
      domain
      depth
      peopleCount
    }
    occupiedRoles {
      titleEnglish
      id
      rank
      militaryOccupation
      person {
        givenName
        familyName
        id
      }
    }
    vacantRoles {
      titleEnglish
      id
      rank
      militaryOccupation
    }
    owner {
      givenName
      familyName
      email
      id
    }
  }
}