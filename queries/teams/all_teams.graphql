query AllTeams($search: String, $includeRetired: Boolean!, $limit: Int, $offset: Int!) {
  allTeams(search: $search, includeRetired: $includeRetired, limit: $limit, offset: $offset) {
    id
    nameEnglish
    nameFrench
    retiredAt
    organization { id nameEn }
    organizationLevel { id nameEn }
  }
  teamsCount(search: $search, includeRetired: $includeRetired)
}
